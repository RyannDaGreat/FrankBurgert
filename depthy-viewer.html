<!DOCTYPE html>
<!--
  Depth Parallax Viewer — ported from Depthy by Rafał Lindemann (MIT License)
  https://github.com/panrafal/depthy

  Settings: expand (cover), dramatic (2x scale), middle focus (0.5)
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FiberSatCo — Depth Viewer</title>
<style>
  :root {
    --bg: #1a1a1a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
  }
  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    cursor: crosshair;
  }
  #flares {
    pointer-events: none;
  }
  #logo-wrap {
    position: absolute;
    top: 0;
    left: 25%;
    width: 50%;
    pointer-events: none;
    display: flex;
    justify-content: center;
    padding-top: 2vh;
    z-index: 10;
  }
  #logo-wrap img {
    width: 100%;
    height: auto;
    filter: drop-shadow(0 0 50px rgba(255, 255, 255, 0.5));
  }
</style>
</head>
<body>
<canvas id="viewer"></canvas>
<canvas id="flares"></canvas>
<div id="logo-wrap"><img src="Logo.svg" alt="FiberSatCo"></div>

<script>
// Copyright (c) 2014 Rafał Lindemann — shader from Depthy (MIT License)
// Ported to standalone WebGL by this project.

const CONFIG = {
  colorImage: 'Gemini_Generated_Image_trup7mtrup7mtrup.png',
  depthImage: 'depth.png',
  scale: 0.04,       // "dramatic" = 0.02 * 2.0
  focus: 0.5,        // "middle"
  enlarge: 1.06,     // slight zoom to prevent edge bleed
  easeFactor: 0.92,  // mouse smoothing (higher = more lag, smoother)
};

// Source image dimensions
const IMG_W = 2730;
const IMG_H = 1536;

// ── Light positions ──
// Each light: { x, y } in normalized [0,1] image coords, depth from depth map,
// color as CSS string, radius of flare in px, intensity [0,1]
const LIGHTS = [
  // Green beacon on top of left dish
  { nx: 0.1953, ny: 0.1456, depth: 0.44, color: [180, 255, 245], radius: 60, intensity: 0.7 },
  // Teal lights along left fence
  { nx: 0.1198, ny: 0.5826, depth: 0.45, color: [10, 244, 241],  radius: 40, intensity: 0.55 },
  { nx: 0.1449, ny: 0.5797, depth: 0.46, color: [28, 242, 232],  radius: 35, intensity: 0.45 },
  { nx: 0.1782, ny: 0.5911, depth: 0.47, color: [3, 229, 227],   radius: 50, intensity: 0.6 },
  // Mid-left fence teal
  { nx: 0.2749, ny: 0.5484, depth: 0.44, color: [6, 217, 202],   radius: 45, intensity: 0.5 },
  // White pole lights
  { nx: 0.3382, ny: 0.5315, depth: 0.35, color: [252, 255, 246], radius: 35, intensity: 0.45 },
  { nx: 0.4134, ny: 0.5710, depth: 0.44, color: [252, 253, 248], radius: 30, intensity: 0.4 },
  // Small white light upper left fence
  { nx: 0.1609, ny: 0.5136, depth: 0.73, color: [249, 249, 247], radius: 25, intensity: 0.35 },
  // Green beacon top of right dish
  { nx: 0.4528, ny: 0.3343, depth: 1.00, color: [173, 231, 243], radius: 50, intensity: 0.6 },
  // Orange warning light between dishes
  { nx: 0.5508, ny: 0.3659, depth: 0.61, color: [255, 220, 80],  radius: 40, intensity: 0.55 },
  // Right teal lights
  { nx: 0.8989, ny: 0.5934, depth: 1.00, color: [180, 255, 255], radius: 40, intensity: 0.5 },
  { nx: 0.9504, ny: 0.6303, depth: 1.00, color: [170, 255, 255], radius: 35, intensity: 0.45 },
];

const canvas = document.getElementById('viewer');
const gl = canvas.getContext('webgl');
if (!gl) {
  document.body.textContent = 'WebGL not supported';
  throw new Error('No WebGL');
}

const flareCanvas = document.getElementById('flares');
const ctx = flareCanvas.getContext('2d');

// ── Shaders ──

const VERT_SRC = `
  attribute vec2 aPosition;
  varying vec2 vTextureCoord;
  void main() {
    vTextureCoord = vec2(aPosition.x, -aPosition.y) * 0.5 + 0.5;
    gl_Position = vec4(aPosition, 0.0, 1.0);
  }
`;

// Depthy's parallax occlusion mapping shader (quality ~4, METHOD 1)
const FRAG_SRC = `
  // Copyright (c) 2014 Rafał Lindemann. http://panrafal.github.com/depthy
  precision mediump float;

  varying vec2 vTextureCoord;
  uniform sampler2D uSampler;
  uniform sampler2D displacementMap;
  uniform vec4 dimensions;
  uniform float scale;
  uniform vec2 offset;
  uniform float focus;
  uniform float enlarge;

  #define METHOD 1
  #define CORRECT
  #define UPSCALE 1.5
  #define ANTIALIAS 2
  #define AA_TRIGGER 0.8
  #define AA_POWER 1.0
  #define AA_MAXITER 8.0
  #define MAXSTEPS 16.0
  #define CONFIDENCE_MAX 2.5
  #define COMPRESSION 0.8

  float steps = MAXSTEPS;
  float maskPower = steps * 1.0;
  float correctPower = 1.0;

  const float compression = COMPRESSION;
  const float dmin = (1.0 - compression) / 2.0;
  const float dmax = (1.0 + compression) / 2.0;
  const float vectorCutoff = 0.0 + dmin - 0.0001;

  void main(void) {
    float aspect = dimensions.x / dimensions.y;
    vec2 scale2 = vec2(scale * min(1.0, 1.0 / aspect), scale * min(1.0, aspect))
                  * vec2(1.0, -1.0) * vec2(UPSCALE);

    mat2 baseVector = mat2(
      vec2((0.5 - focus) * offset - offset / 2.0) * scale2,
      vec2((0.5 - focus) * offset + offset / 2.0) * scale2
    );

    vec2 pos = (vTextureCoord - vec2(0.5)) / vec2(enlarge) + vec2(0.5);
    mat2 vector = baseVector;

    float dstep = compression / (steps - 1.0);
    vec2 vstep = (vector[1] - vector[0]) / vec2(steps - 1.0);

    vec2 posSum = vec2(0.0);
    float confidenceSum = 0.0;

    // Antialias index
    float j = 0.0;

    for (float i = 0.0; i < MAXSTEPS; ++i) {
      vec2 vpos = pos + vector[1] - j * vstep;
      float dpos = 0.5 + compression / 2.0 - j * dstep;

      float depth = 1.0 - texture2D(displacementMap, vpos).r;
      depth = clamp(depth, dmin + 0.001, dmax);

      float confidence = step(dpos, depth);

      confidence *= step(vectorCutoff, dpos);
      confidence *= step(confidenceSum, CONFIDENCE_MAX);

      // AA method 2: go back halfstep on hit, go forward fullstep
      j += 1.0 + step(AA_TRIGGER, confidence) * step(i, j) * -1.5;

      posSum += (vpos + vec2((depth - dpos) / (dstep * correctPower)) * vstep) * confidence;
      confidenceSum += confidence;
    }

    gl_FragColor = texture2D(uSampler, posSum / confidenceSum);
  }
`;

// ── WebGL setup ──

function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    throw new Error('Shader compile: ' + gl.getShaderInfoLog(s));
  }
  return s;
}

const program = gl.createProgram();
gl.attachShader(program, compileShader(gl.VERTEX_SHADER, VERT_SRC));
gl.attachShader(program, compileShader(gl.FRAGMENT_SHADER, FRAG_SRC));
gl.linkProgram(program);
if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
  throw new Error('Program link: ' + gl.getProgramInfoLog(program));
}
gl.useProgram(program);

// Fullscreen quad
const quadBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(program, 'aPosition');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

// Uniforms
const uDimensions = gl.getUniformLocation(program, 'dimensions');
const uScale      = gl.getUniformLocation(program, 'scale');
const uOffset     = gl.getUniformLocation(program, 'offset');
const uFocus      = gl.getUniformLocation(program, 'focus');
const uEnlarge    = gl.getUniformLocation(program, 'enlarge');
const uSampler    = gl.getUniformLocation(program, 'uSampler');
const uDepthMap   = gl.getUniformLocation(program, 'displacementMap');

gl.uniform1f(uScale, CONFIG.scale);
gl.uniform1f(uFocus, CONFIG.focus);
gl.uniform1f(uEnlarge, CONFIG.enlarge);
gl.uniform1i(uSampler, 0);
gl.uniform1i(uDepthMap, 1);

// ── Texture loading ──

function loadTexture(url, unit) {
  return new Promise((resolve) => {
    const tex = gl.createTexture();
    const img = new Image();
    img.onload = () => {
      gl.activeTexture(gl.TEXTURE0 + unit);
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      resolve({ tex, width: img.naturalWidth, height: img.naturalHeight });
    };
    img.src = url;
  });
}

// ── Mouse tracking ──

let targetOffset = { x: 0, y: 0 };
let easedOffset  = { x: 0, y: 0 };

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width  * 2 - 1;
  const y = (e.clientY - rect.top)  / rect.height * 2 - 1;
  targetOffset.x = -x;
  targetOffset.y = y;
});

canvas.addEventListener('mouseleave', () => {
  targetOffset.x = 0;
  targetOffset.y = 0;
});

// ── Gyroscope / device orientation for mobile ──

if (window.DeviceOrientationEvent) {
  window.addEventListener('deviceorientation', (e) => {
    if (e.gamma === null) return;
    const TILT_RANGE_DEG = 20;
    targetOffset.x = -Math.max(-1, Math.min(1, e.gamma / TILT_RANGE_DEG));
    targetOffset.y = -Math.max(-1, Math.min(1, (e.beta - 45) / TILT_RANGE_DEG));
  });
}

// ── Resize ──

function resize() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = canvas.clientWidth  * dpr;
  canvas.height = canvas.clientHeight * dpr;
  flareCanvas.width  = canvas.width;
  flareCanvas.height = canvas.height;
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.uniform4fv(uDimensions, [canvas.width, canvas.height, 0, 0]);
}
window.addEventListener('resize', resize);

// ── Lens flare rendering ──

/**
 * Pure function, general. Compute the screen-space position of a source texel
 * after the Depthy parallax shader displaces it, by inverting the shader's
 * ray-march lookup.
 *
 * The shader maps screen UV -> source UV by: sourceUV = screenUV + displacement.
 * So the inverse (source -> screen) is: screenUV = sourceUV - displacement.
 * Displacement for a point at depth d = offset * (d - focus) * scale2.
 *
 * Args:
 *   nx (number): Source texel x in [0,1]
 *   ny (number): Source texel y in [0,1]
 *   depth (number): Depth map value [0,1] (white=1=near)
 *   offset (object): {x, y} current eased parallax offset [-1,1]
 *   scale (number): Displacement scale (CONFIG.scale)
 *   focus (number): Focus depth [0,1]
 *   aspect (number): Canvas width / height
 *   enlarge (number): Enlarge factor (CONFIG.enlarge)
 *
 * Returns:
 *   {sx, sy}: Screen position in [0,1] UV space
 *
 * Examples:
 *   >>> // At zero offset, screen pos equals source pos (adjusted for enlarge)
 *   >>> computeScreenPos(0.5, 0.5, 0.5, {x:0,y:0}, 0.04, 0.5, 16/9, 1.06)
 *   {sx: 0.5, sy: 0.5}
 */
function computeScreenPos(nx, ny, depth, offset, scale, focus, aspect, enlarge) {
  const UPSCALE = 1.5;
  const COMPRESSION = 0.8;

  // Match shader's scale2 computation exactly
  const sx = scale * Math.min(1, 1 / aspect) * 1.0 * UPSCALE;
  const sy = scale * Math.min(1, aspect) * -1.0 * UPSCALE;

  // Shader depth: inverted from the depth map texture
  const shaderDepth = 1.0 - depth;
  // Clamp to compressed range like shader does
  const dmin = (1.0 - COMPRESSION) / 2.0;
  const dmax = (1.0 + COMPRESSION) / 2.0;
  const clampedDepth = Math.max(dmin + 0.001, Math.min(dmax, shaderDepth));

  // The shader's displacement for this depth:
  // At step j where dpos matches depth, the sampled position is:
  //   vpos = screenPos + vector[1] - j * vstep + correction
  // where vector[1] = (0.5 - focus) * offset * scale2 + offset/2 * scale2
  // and the displacement at depth d is approximately: offset * (d - focus) * scale2
  // So: sourceUV = screenUV + offset * (clampedDepth - focus) * scale2
  // Invert: screenUV = sourceUV - offset * (clampedDepth - focus) * scale2
  const depthFactor = clampedDepth - focus;
  const dispX = offset.x * depthFactor * sx;
  const dispY = offset.y * depthFactor * sy;

  // Invert the enlarge transform: pos = (uv - 0.5) / enlarge + 0.5
  // So: uv = (pos - 0.5) * enlarge + 0.5
  const screenX = ((nx - dispX) - 0.5) * enlarge + 0.5;
  const screenY = ((ny - dispY) - 0.5) * enlarge + 0.5;

  return { sx: screenX, sy: screenY };
}

/**
 * Pure function, general. Convert RGB [0-255] to HSL.
 *
 * Args:
 *   r, g, b (number): RGB values [0, 255]
 *
 * Returns:
 *   {h, s, l}: h in [0,360], s and l in [0,100]
 *
 * Examples:
 *   >>> rgbToHsl(255, 0, 0)
 *   {h: 0, s: 100, l: 50}
 *   >>> rgbToHsl(0, 255, 255)
 *   {h: 180, s: 100, l: 50}
 */
function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  const l = (max + min) / 2;
  if (max === min) return { h: 0, s: 0, l: l * 100 };
  const d = max - min;
  const s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
  let h;
  if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
  else if (max === g) h = ((b - r) / d + 2) / 6;
  else h = ((r - g) / d + 4) / 6;
  return { h: h * 360, s: s * 100, l: l * 100 };
}

// Pre-initialize flare disc properties for each light (randomized sizes per light,
// but stable across frames). Each light gets a chain of discs.
const DISC_COUNT = 7;
const flareDiscs = LIGHTS.map(light => {
  const { h } = rgbToHsl(...light.color);
  const discs = [];
  for (let i = 0; i <= DISC_COUNT; i++) {
    const j = i - DISC_COUNT / 2;
    discs.push({
      // Disc size: larger at extremes, smaller near center
      diaBase: (Math.pow(Math.abs(10 * (j / DISC_COUNT)), 2) * 2) + (Math.random() * 30 - 15),
      // Hue: vary slightly from the light's base hue
      hue: h + (Math.random() * 40 - 20),
    });
  }
  return discs;
});

/**
 * Command, specific. Draws CodePen-style lens flares for all light sources.
 * Each light produces a chain of ghost discs along the line from the light
 * through screen center, plus a bright core with cross streaks.
 * Adapted from https://codepen.io (Flare demo).
 * Mutates the flare canvas context.
 */
function drawFlares(offset) {
  const w = flareCanvas.width;
  const h = flareCanvas.height;
  const aspect = w / h;
  const halfW = w / 2;
  const halfH = h / 2;
  const diagHalf = Math.sqrt(halfW * halfW + halfH * halfH);

  ctx.clearRect(0, 0, w, h);
  ctx.globalCompositeOperation = 'screen';

  for (let li = 0; li < LIGHTS.length; li++) {
    const light = LIGHTS[li];
    const discs = flareDiscs[li];
    const [lr, lg, lb] = light.color;
    const { h: baseHue } = rgbToHsl(lr, lg, lb);

    const screen = computeScreenPos(
      light.nx, light.ny, light.depth,
      offset, CONFIG.scale, CONFIG.focus, aspect, CONFIG.enlarge
    );

    const lx = screen.sx * w;
    const ly = screen.sy * h;

    // Distance from screen center, normalized [0,1] — controls overall intensity
    const distFromCenter = Math.sqrt((lx - halfW) ** 2 + (ly - halfH) ** 2);
    const dist = 1 - distFromCenter / diagHalf;
    const screenScale = w / 1920;
    const sizeScale = light.radius * light.intensity / 40 * screenScale;

    // Draw ghost disc chain along line from light through screen center
    for (let i = 0; i <= DISC_COUNT; i++) {
      const j = i - DISC_COUNT / 2;
      const t = j / DISC_COUNT * 2;
      const dx = (halfW - lx) * t + halfW;
      const dy = (halfH - ly) * t + halfH;
      const dia = (discs[i].diaBase + light.radius) * sizeScale;
      const hue = discs[i].hue;

      // Ghost disc glow
      ctx.beginPath();
      const grad = ctx.createRadialGradient(dx, dy, 0, dx, dy, dia);
      grad.addColorStop(0,   'hsla(' + hue + ',100%,90%,0)');
      grad.addColorStop(0.9, 'hsla(' + hue + ',100%,90%,' + (0.15 * dist * light.intensity) + ')');
      grad.addColorStop(1,   'hsla(' + hue + ',100%,90%,0)');
      ctx.fillStyle = grad;
      ctx.arc(dx, dy, dia, 0, Math.PI * 2);
      ctx.closePath();
      ctx.fill();

      // First disc (at the light source) gets special treatment
      if (i === 0) {
        const sdist = 1 - Math.pow(Math.abs(dist - 1), 3);
        const coreIntensity = sdist * light.intensity;

        // Outer bloom
        ctx.beginPath();
        const bloom = ctx.createRadialGradient(dx, dy, 0, dx, dy, dia * 2);
        bloom.addColorStop(0, 'rgba(' + lr + ',' + lg + ',' + lb + ',' + (0.2 * coreIntensity) + ')');
        bloom.addColorStop(1, 'rgba(' + lr + ',' + lg + ',' + lb + ',0)');
        ctx.fillStyle = bloom;
        ctx.arc(dx, dy, dia * 2, 0, Math.PI * 2);
        ctx.closePath();
        ctx.fill();

        // Bright specular core
        const ease = (a, b, t) => (b - a) * (1 - Math.pow(t - 1, 2)) + a;
        const spec = ease(dia / 5, dia / 2.5, dist);
        ctx.beginPath();
        const core = ctx.createRadialGradient(dx, dy, 0, dx, dy, spec);
        core.addColorStop(0.2 * sdist, 'rgba(255,255,255,' + coreIntensity + ')');
        core.addColorStop(0.6, 'hsla(' + baseHue + ',100%,75%,' + (0.3 * coreIntensity) + ')');
        core.addColorStop(1,   'hsla(' + baseHue + ',100%,40%,0)');
        ctx.fillStyle = core;
        ctx.arc(dx, dy, spec, 0, Math.PI * 2);
        ctx.closePath();
        ctx.fill();

        // Horizontal streak
        const streakAlpha = 0.4 * dist * dist * dist * light.intensity;
        const streakLen = dia * 1.5;
        ctx.beginPath();
        const hStreak = ctx.createLinearGradient(dx - streakLen, dy, dx + streakLen, dy);
        hStreak.addColorStop(0,  'rgba(' + lr + ',' + lg + ',' + lb + ',0)');
        hStreak.addColorStop(0.5, 'rgba(' + lr + ',' + lg + ',' + lb + ',' + streakAlpha + ')');
        hStreak.addColorStop(1,  'rgba(' + lr + ',' + lg + ',' + lb + ',0)');
        ctx.fillStyle = hStreak;
        ctx.fillRect(dx - streakLen, dy - 2, streakLen * 2, 4);

        // Vertical streak
        ctx.beginPath();
        const vStreak = ctx.createLinearGradient(dx, dy - streakLen, dx, dy + streakLen);
        vStreak.addColorStop(0,  'rgba(' + lr + ',' + lg + ',' + lb + ',0)');
        vStreak.addColorStop(0.5, 'rgba(' + lr + ',' + lg + ',' + lb + ',' + streakAlpha + ')');
        vStreak.addColorStop(1,  'rgba(' + lr + ',' + lg + ',' + lb + ',0)');
        ctx.fillStyle = vStreak;
        ctx.fillRect(dx - 2, dy - streakLen, 4, streakLen * 2);
      }
    }
  }

  ctx.globalCompositeOperation = 'source-over';
}

// ── Render loop ──

function render() {
  const ease = CONFIG.easeFactor;
  easedOffset.x = easedOffset.x * ease + targetOffset.x * (1 - ease);
  easedOffset.y = easedOffset.y * ease + targetOffset.y * (1 - ease);

  gl.uniform2f(uOffset, easedOffset.x, easedOffset.y);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  drawFlares(easedOffset);

  requestAnimationFrame(render);
}

// ── Boot ──

Promise.all([
  loadTexture(CONFIG.colorImage, 0),
  loadTexture(CONFIG.depthImage, 1),
]).then(() => {
  resize();
  render();
});
</script>
</body>
</html>
