<!DOCTYPE html>
<!--
  Depth Parallax Viewer — ported from Depthy by Rafał Lindemann (MIT License)
  https://github.com/panrafal/depthy

  Settings: expand (cover), dramatic (2x scale), middle focus (0.5)
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FiberSatCo — Depth Viewer</title>
<style>
  :root {
    --bg: #1a1a1a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
  }
  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    cursor: crosshair;
  }
  #flares {
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="viewer"></canvas>
<canvas id="flares"></canvas>

<script>
// Copyright (c) 2014 Rafał Lindemann — shader from Depthy (MIT License)
// Ported to standalone WebGL by this project.

const CONFIG = {
  colorImage: 'Gemini_Generated_Image_trup7mtrup7mtrup.png',
  depthImage: 'depth.png',
  scale: 0.04,       // "dramatic" = 0.02 * 2.0
  focus: 0.5,        // "middle"
  enlarge: 1.06,     // slight zoom to prevent edge bleed
  easeFactor: 0.92,  // mouse smoothing (higher = more lag, smoother)
};

// Source image dimensions
const IMG_W = 2730;
const IMG_H = 1536;

// ── Light positions ──
// Each light: { x, y } in normalized [0,1] image coords, depth from depth map,
// color as CSS string, radius of flare in px, intensity [0,1]
const LIGHTS = [
  // Green beacon on top of left dish
  { nx: 0.1953, ny: 0.1456, depth: 0.44, color: [180, 255, 245], radius: 60, intensity: 0.7 },
  // Teal lights along left fence
  { nx: 0.1198, ny: 0.5826, depth: 0.45, color: [10, 244, 241],  radius: 40, intensity: 0.55 },
  { nx: 0.1449, ny: 0.5797, depth: 0.46, color: [28, 242, 232],  radius: 35, intensity: 0.45 },
  { nx: 0.1782, ny: 0.5911, depth: 0.47, color: [3, 229, 227],   radius: 50, intensity: 0.6 },
  // Mid-left fence teal
  { nx: 0.2749, ny: 0.5484, depth: 0.44, color: [6, 217, 202],   radius: 45, intensity: 0.5 },
  // White pole lights
  { nx: 0.3382, ny: 0.5315, depth: 0.35, color: [252, 255, 246], radius: 35, intensity: 0.45 },
  { nx: 0.4134, ny: 0.5710, depth: 0.44, color: [252, 253, 248], radius: 30, intensity: 0.4 },
  // Small white light upper left fence
  { nx: 0.1609, ny: 0.5136, depth: 0.73, color: [249, 249, 247], radius: 25, intensity: 0.35 },
  // Green beacon top of right dish
  { nx: 0.4528, ny: 0.3343, depth: 1.00, color: [173, 231, 243], radius: 50, intensity: 0.6 },
  // Orange warning light between dishes
  { nx: 0.5508, ny: 0.3659, depth: 0.61, color: [255, 220, 80],  radius: 40, intensity: 0.55 },
  // Right teal lights
  { nx: 0.8989, ny: 0.5934, depth: 1.00, color: [180, 255, 255], radius: 40, intensity: 0.5 },
  { nx: 0.9504, ny: 0.6303, depth: 1.00, color: [170, 255, 255], radius: 35, intensity: 0.45 },
];

const canvas = document.getElementById('viewer');
const gl = canvas.getContext('webgl');
if (!gl) {
  document.body.textContent = 'WebGL not supported';
  throw new Error('No WebGL');
}

const flareCanvas = document.getElementById('flares');
const ctx = flareCanvas.getContext('2d');

// ── Shaders ──

const VERT_SRC = `
  attribute vec2 aPosition;
  varying vec2 vTextureCoord;
  void main() {
    vTextureCoord = vec2(aPosition.x, -aPosition.y) * 0.5 + 0.5;
    gl_Position = vec4(aPosition, 0.0, 1.0);
  }
`;

// Depthy's parallax occlusion mapping shader (quality ~4, METHOD 1)
const FRAG_SRC = `
  // Copyright (c) 2014 Rafał Lindemann. http://panrafal.github.com/depthy
  precision mediump float;

  varying vec2 vTextureCoord;
  uniform sampler2D uSampler;
  uniform sampler2D displacementMap;
  uniform vec4 dimensions;
  uniform float scale;
  uniform vec2 offset;
  uniform float focus;
  uniform float enlarge;

  #define METHOD 1
  #define CORRECT
  #define UPSCALE 1.5
  #define ANTIALIAS 2
  #define AA_TRIGGER 0.8
  #define AA_POWER 1.0
  #define AA_MAXITER 8.0
  #define MAXSTEPS 16.0
  #define CONFIDENCE_MAX 2.5
  #define COMPRESSION 0.8

  float steps = MAXSTEPS;
  float maskPower = steps * 1.0;
  float correctPower = 1.0;

  const float compression = COMPRESSION;
  const float dmin = (1.0 - compression) / 2.0;
  const float dmax = (1.0 + compression) / 2.0;
  const float vectorCutoff = 0.0 + dmin - 0.0001;

  void main(void) {
    float aspect = dimensions.x / dimensions.y;
    vec2 scale2 = vec2(scale * min(1.0, 1.0 / aspect), scale * min(1.0, aspect))
                  * vec2(1.0, -1.0) * vec2(UPSCALE);

    mat2 baseVector = mat2(
      vec2((0.5 - focus) * offset - offset / 2.0) * scale2,
      vec2((0.5 - focus) * offset + offset / 2.0) * scale2
    );

    vec2 pos = (vTextureCoord - vec2(0.5)) / vec2(enlarge) + vec2(0.5);
    mat2 vector = baseVector;

    float dstep = compression / (steps - 1.0);
    vec2 vstep = (vector[1] - vector[0]) / vec2(steps - 1.0);

    vec2 posSum = vec2(0.0);
    float confidenceSum = 0.0;

    // Antialias index
    float j = 0.0;

    for (float i = 0.0; i < MAXSTEPS; ++i) {
      vec2 vpos = pos + vector[1] - j * vstep;
      float dpos = 0.5 + compression / 2.0 - j * dstep;

      float depth = 1.0 - texture2D(displacementMap, vpos).r;
      depth = clamp(depth, dmin + 0.001, dmax);

      float confidence = step(dpos, depth);

      confidence *= step(vectorCutoff, dpos);
      confidence *= step(confidenceSum, CONFIDENCE_MAX);

      // AA method 2: go back halfstep on hit, go forward fullstep
      j += 1.0 + step(AA_TRIGGER, confidence) * step(i, j) * -1.5;

      posSum += (vpos + vec2((depth - dpos) / (dstep * correctPower)) * vstep) * confidence;
      confidenceSum += confidence;
    }

    gl_FragColor = texture2D(uSampler, posSum / confidenceSum);
  }
`;

// ── WebGL setup ──

function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    throw new Error('Shader compile: ' + gl.getShaderInfoLog(s));
  }
  return s;
}

const program = gl.createProgram();
gl.attachShader(program, compileShader(gl.VERTEX_SHADER, VERT_SRC));
gl.attachShader(program, compileShader(gl.FRAGMENT_SHADER, FRAG_SRC));
gl.linkProgram(program);
if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
  throw new Error('Program link: ' + gl.getProgramInfoLog(program));
}
gl.useProgram(program);

// Fullscreen quad
const quadBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(program, 'aPosition');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

// Uniforms
const uDimensions = gl.getUniformLocation(program, 'dimensions');
const uScale      = gl.getUniformLocation(program, 'scale');
const uOffset     = gl.getUniformLocation(program, 'offset');
const uFocus      = gl.getUniformLocation(program, 'focus');
const uEnlarge    = gl.getUniformLocation(program, 'enlarge');
const uSampler    = gl.getUniformLocation(program, 'uSampler');
const uDepthMap   = gl.getUniformLocation(program, 'displacementMap');

gl.uniform1f(uScale, CONFIG.scale);
gl.uniform1f(uFocus, CONFIG.focus);
gl.uniform1f(uEnlarge, CONFIG.enlarge);
gl.uniform1i(uSampler, 0);
gl.uniform1i(uDepthMap, 1);

// ── Texture loading ──

function loadTexture(url, unit) {
  return new Promise((resolve) => {
    const tex = gl.createTexture();
    const img = new Image();
    img.onload = () => {
      gl.activeTexture(gl.TEXTURE0 + unit);
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      resolve({ tex, width: img.naturalWidth, height: img.naturalHeight });
    };
    img.src = url;
  });
}

// ── Mouse tracking ──

let targetOffset = { x: 0, y: 0 };
let easedOffset  = { x: 0, y: 0 };

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width  * 2 - 1;
  const y = (e.clientY - rect.top)  / rect.height * 2 - 1;
  targetOffset.x = -x;
  targetOffset.y = y;
});

canvas.addEventListener('mouseleave', () => {
  targetOffset.x = 0;
  targetOffset.y = 0;
});

// ── Gyroscope / device orientation for mobile ──

if (window.DeviceOrientationEvent) {
  window.addEventListener('deviceorientation', (e) => {
    if (e.gamma === null) return;
    const TILT_RANGE_DEG = 20;
    targetOffset.x = -Math.max(-1, Math.min(1, e.gamma / TILT_RANGE_DEG));
    targetOffset.y = -Math.max(-1, Math.min(1, (e.beta - 45) / TILT_RANGE_DEG));
  });
}

// ── Resize ──

function resize() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = canvas.clientWidth  * dpr;
  canvas.height = canvas.clientHeight * dpr;
  flareCanvas.width  = canvas.width;
  flareCanvas.height = canvas.height;
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.uniform4fv(uDimensions, [canvas.width, canvas.height, 0, 0]);
}
window.addEventListener('resize', resize);

// ── Lens flare rendering ──

/**
 * Pure function, general. Compute parallax displacement for a point at a given
 * depth, matching the Depthy shader's displacement math.
 *
 * Args:
 *   nx (number): Normalized x position [0,1]
 *   ny (number): Normalized y position [0,1]
 *   depth (number): Depth value [0,1] (white=1=near in depth map)
 *   offset (object): {x, y} current eased parallax offset
 *   scale (number): Displacement scale
 *   focus (number): Focus depth [0,1]
 *   aspect (number): Canvas width/height
 *
 * Returns:
 *   {dx, dy}: Pixel displacement to apply
 *
 * Examples:
 *   >>> // At focus depth with no offset, displacement is zero
 *   >>> computeParallaxShift(0.5, 0.5, 0.5, {x:0,y:0}, 0.04, 0.5, 16/9)
 *   {dx: 0, dy: 0}
 */
function computeParallaxShift(nx, ny, depth, offset, scale, focus, aspect) {
  const UPSCALE = 1.5;
  const sx = scale * Math.min(1, 1 / aspect) * UPSCALE;
  const sy = scale * Math.min(1, aspect) * -UPSCALE;

  // Depth in shader space: inverted, compressed
  const COMPRESSION = 0.8;
  const shaderDepth = 1.0 - depth; // shader does 1 - texture.r
  const depthFactor = shaderDepth - focus;

  const dx = offset.x * depthFactor * sx;
  const dy = offset.y * depthFactor * sy;

  return { dx, dy };
}

/**
 * Command, specific. Draws all lens flares onto the 2D canvas overlay.
 * Mutates the flare canvas context.
 */
function drawFlares(offset) {
  const w = flareCanvas.width;
  const h = flareCanvas.height;
  const aspect = w / h;

  ctx.clearRect(0, 0, w, h);

  for (const light of LIGHTS) {
    const shift = computeParallaxShift(
      light.nx, light.ny, light.depth,
      offset, CONFIG.scale, CONFIG.focus, aspect
    );

    // Convert normalized image coords to canvas pixels
    // The image is displayed in "cover" mode via the enlarge uniform
    const cx = light.nx * w + shift.dx * w;
    const cy = light.ny * h + shift.dy * h;

    const r = light.radius * (w / 1920); // scale flare size to screen
    const [lr, lg, lb] = light.color;
    const intensity = light.intensity;

    // Core glow — soft radial gradient
    const coreR = r * 0.4;
    const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR);
    core.addColorStop(0, `rgba(${lr},${lg},${lb},${intensity})`);
    core.addColorStop(0.3, `rgba(${lr},${lg},${lb},${intensity * 0.6})`);
    core.addColorStop(1, `rgba(${lr},${lg},${lb},0)`);
    ctx.fillStyle = core;
    ctx.fillRect(cx - coreR, cy - coreR, coreR * 2, coreR * 2);

    // Outer bloom — larger, softer
    const bloom = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    bloom.addColorStop(0, `rgba(${lr},${lg},${lb},${intensity * 0.35})`);
    bloom.addColorStop(0.2, `rgba(${lr},${lg},${lb},${intensity * 0.15})`);
    bloom.addColorStop(1, `rgba(${lr},${lg},${lb},0)`);
    ctx.fillStyle = bloom;
    ctx.fillRect(cx - r, cy - r, r * 2, r * 2);

    // Horizontal streak — anamorphic flare
    const streakLen = r * 2.5;
    const streakH = r * 0.12;
    const streak = ctx.createLinearGradient(cx - streakLen, cy, cx + streakLen, cy);
    streak.addColorStop(0, `rgba(${lr},${lg},${lb},0)`);
    streak.addColorStop(0.3, `rgba(${lr},${lg},${lb},${intensity * 0.2})`);
    streak.addColorStop(0.5, `rgba(${lr},${lg},${lb},${intensity * 0.35})`);
    streak.addColorStop(0.7, `rgba(${lr},${lg},${lb},${intensity * 0.2})`);
    streak.addColorStop(1, `rgba(${lr},${lg},${lb},0)`);
    ctx.fillStyle = streak;
    ctx.fillRect(cx - streakLen, cy - streakH, streakLen * 2, streakH * 2);

    // Star spikes — 4-point cross
    ctx.save();
    ctx.globalAlpha = intensity * 0.25;
    ctx.strokeStyle = `rgb(${lr},${lg},${lb})`;
    ctx.lineWidth = 1;
    const spikeLen = r * 0.8;
    for (let angle = 0; angle < Math.PI; angle += Math.PI / 4) {
      ctx.beginPath();
      ctx.moveTo(cx - Math.cos(angle) * spikeLen, cy - Math.sin(angle) * spikeLen);
      ctx.lineTo(cx + Math.cos(angle) * spikeLen, cy + Math.sin(angle) * spikeLen);
      ctx.stroke();
    }
    ctx.restore();
  }
}

// ── Render loop ──

function render() {
  const ease = CONFIG.easeFactor;
  easedOffset.x = easedOffset.x * ease + targetOffset.x * (1 - ease);
  easedOffset.y = easedOffset.y * ease + targetOffset.y * (1 - ease);

  gl.uniform2f(uOffset, easedOffset.x, easedOffset.y);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  drawFlares(easedOffset);

  requestAnimationFrame(render);
}

// ── Boot ──

Promise.all([
  loadTexture(CONFIG.colorImage, 0),
  loadTexture(CONFIG.depthImage, 1),
]).then(() => {
  resize();
  render();
});
</script>
</body>
</html>
